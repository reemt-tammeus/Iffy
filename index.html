<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iffy - Conditional Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header id="stats-bar" class="hidden">
            <div id="lives">❤️❤️❤️</div>
            <div id="streak">🔥 0</div>
        </header>

        <main id="content-area">
            <div id="start-screen">
                <div class="start-ui-zone">
                    <h1>The Ultimate Conditional Trainer</h1>
                    <div class="mode-selection">
                        <button onclick="startGame('quickie')">Quickie-Mode (MC)</button>
                        <button onclick="startGame('ap')">AP-Mode (Tippen)</button>
                    </div>
                </div>
                <div class="start-image-zone">
                    <img src="logo.jpg" alt="Iffy Logo" id="logo" onerror="this.style.display='none'">
                </div>
            </div>

            <div id="game-screen" class="hidden">
                <div id="text-display">Lade Satz...</div>
            </div>
        </main>

        <footer id="thumb-zone" class="hidden">
            <div id="quickie-controls" class="hidden"></div>
            
            <div id="ap-controls" class="hidden">
                <div id="ap-input-display"></div>
                <div id="keyboard"></div>
                <button id="ap-submit" onclick="checkAPAnswer()">Prüfen</button>
            </div>
            
            <button id="next-btn" class="hidden" onclick="loadNext()">WEITER</button>
        </footer>

        <div id="feedback-flash" class="hidden"></div>

        <div id="game-over-screen" class="hidden">
            <img src="loser.jpg" alt="Game Over" onerror="this.style.display='none'">
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
